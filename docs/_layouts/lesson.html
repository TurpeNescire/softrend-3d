<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <!-- Apply saved theme before first paint to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem('sr3d-theme') || 'theme-dark';
      document.documentElement.className = t;
    })();
  </script>
</head>
<body>

  <nav class="lesson-nav">
    <a href="{{ '/' | relative_url }}">Contents</a>
    {% if page.prev_lesson %}
      <a href="{{ page.prev_lesson | relative_url }}">← Prev</a>
    {% endif %}
    {% if page.next_lesson %}
      <a href="{{ page.next_lesson | relative_url }}">Next →</a>
    {% endif %}
    <div class="nav-links">
      <select id="theme-picker">
        <option value="theme-dark">Dark</option>
        <option value="theme-terminal">Terminal</option>
        <option value="theme-docs">Docs</option>
        <option value="theme-editorial">Editorial</option>
      </select>
    </div>
  </nav>

  <!-- page-layout: flex row on wide screens, column on mobile -->
  <div class="page-layout">

    <!-- toc-sidebar: auto-populated by toc-build.js below -->
    <nav class="toc-sidebar">
      <div class="toc-title">Contents</div>
      <ul id="toc-list"></ul>
    </nav>

    <main>
      <div class="accent-rule"></div>
      <div class="lesson-label">{{ page.lesson_label | default: "" }}</div>
      {{ content }}
    </main>

  </div>

  <nav class="bottom-nav">
    <a href="{{ '/' | relative_url }}">↑ Contents</a>
    <span>
      {% if page.prev_lesson %}
        <a href="{{ page.prev_lesson | relative_url }}">← Prev</a>
        &nbsp;
      {% endif %}
      {% if page.next_lesson %}
        <a href="{{ page.next_lesson | relative_url }}">Next →</a>
      {% endif %}
    </span>
  </nav>

  <script src="{{ '/js/theme.js' | relative_url }}"></script>

  <!-- Build TOC from heading ids that kramdown generates automatically -->
  <script>
    (function () {
      var headings = document.querySelectorAll('main h1, main h2, main h3');
      var tocList  = document.getElementById('toc-list');
      var sidebar  = document.querySelector('.toc-sidebar');
      if (!tocList || headings.length === 0) {
        if (sidebar) sidebar.style.display = 'none'; // hide if no headings
        return;
      }
      headings.forEach(function (h) {
        if (!h.id) return;
        var li = document.createElement('li');
        var classMap = { 'H1': 'toc-h1', 'H2': 'toc-h2', 'H3': 'toc-h3' };
        li.className = classMap[h.tagName] || 'toc-h2';
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        tocList.appendChild(li);
      });
    })();
  </script>
</body>
</html>
